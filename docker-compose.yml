services:
  blippy:
    build: .
    network_mode: "host"
    privileged: true

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    
    volumes:
      - ./database.db:/app/database.db
      - ./storage:/app/storage
      - /var/run/dbus:/var/run/dbus
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - $HOME/.Xauthority:/root/.Xauthority:ro

    stdin_open: true
    tty: true
