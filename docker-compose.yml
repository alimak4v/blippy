
services:
  blippy:
    build: .
    network_mode: "host"
    privileged: true
    
    volumes:
      - /var/run/dbus:/var/run/dbus
      - ./database.db:/app/database.db

    stdin_open: true
    tty: true

    command: >
      bash -c "
      bluetoothctl power on &&
      bluetoothctl advertise on &&
      python main.py
      "
